<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SonidoVisible</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0D0D14;
    color: #F9FAFB;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .container { width: 100%; max-width: 480px; padding: 0 16px; }

  /* Header */
  .header { padding: 32px 24px 0; display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #7C3AED, #10B981);
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .app-name { font-weight: 800; font-size: 20px; letter-spacing: -0.02em; }
  .app-sub { color: #6B7280; font-size: 12px; }

  /* Cards */
  .card {
    background: #13131F; border-radius: 20px;
    border: 1.5px solid #1F2937; margin-bottom: 16px;
    transition: border-color 0.4s;
  }

  /* Main status */
  .status-card { padding: 28px 16px 20px; text-align: center; }
  .big-emoji { font-size: 56px; margin-bottom: 8px; line-height: 1; }
  .status-label {
    font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 4px; transition: color 0.3s; color: #4B5563;
  }
  .status-sub { color: #6B7280; font-size: 13px; margin-bottom: 20px; }

  /* Wave */
  .wave-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 3px; height: 80px; padding: 0 16px;
  }
  .bar {
    width: 4px; background: #374151; border-radius: 99px;
    transition: height 0.08s ease, background 0.3s ease;
    min-height: 4px;
  }

  /* dB meter */
  .db-meter { padding: 0 24px; margin-top: 12px; }
  .db-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .db-label { color: #9CA3AF; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
  .db-value { font-weight: 700; font-size: 14px; color: #10B981; }
  .db-track { background: #1F2937; border-radius: 99px; height: 10px; overflow: hidden; }
  .db-fill {
    height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, #7C3AED, #10B981);
    transition: width 0.1s ease, background 0.3s ease;
  }

  /* Button */
  .btn {
    margin-top: 20px; padding: 14px 40px; border-radius: 99px;
    border: none; cursor: pointer; font-weight: 700; font-size: 15px;
    letter-spacing: 0.02em; background: linear-gradient(135deg, #7C3AED, #10B981);
    color: #fff; transition: all 0.2s;
  }
  .btn.stop { background: #1F2937; color: #EF4444; }
  .btn:active { transform: scale(0.97); }

  .error-msg {
    margin-top: 12px; color: #EF4444; font-size: 13px;
    background: #EF444415; border-radius: 8px; padding: 8px 12px;
  }

  /* Scale */
  .scale-card { padding: 16px; }
  .section-title {
    color: #9CA3AF; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 12px;
  }
  .scale-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid transparent; transition: all 0.3s;
    margin-bottom: 4px;
  }
  .scale-emoji { font-size: 18px; width: 28px; text-align: center; }
  .scale-name { flex: 1; font-size: 13px; color: #D1D5DB; transition: color 0.3s; }
  .scale-db { font-size: 11px; color: #6B7280; }

  /* Events */
  .events-card { padding: 16px; }
  .event-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: #1A1A2E; border-radius: 12px;
    border: 1px solid transparent; margin-bottom: 8px;
    transition: opacity 0.5s;
  }
  .event-emoji { font-size: 24px; }
  .event-info { flex: 1; }
  .event-name { font-weight: 600; font-size: 14px; }
  .event-time { color: #6B7280; font-size: 11px; }
  .event-badge {
    border-radius: 99px; padding: 2px 10px;
    font-size: 12px; font-weight: 700;
  }

  .spacer { height: 32px; }
</style>
</head>
<body>

<div class="header container">
  <div class="logo">👁️</div>
  <div>
    <div class="app-name">SonidoVisible</div>
    <div class="app-sub">Entorno sonoro en tiempo real</div>
  </div>
</div>

<div class="container">

  <!-- Status card -->
  <div class="card status-card" id="statusCard">
    <div class="big-emoji" id="bigEmoji">🎙️</div>
    <div class="status-label" id="statusLabel">Micrófono apagado</div>
    <div class="status-sub" id="statusSub">Tocá el botón para comenzar</div>

    <div class="wave-wrap" id="waveWrap"></div>

    <div class="db-meter" id="dbMeter" style="display:none">
      <div class="db-row">
        <span class="db-label">Nivel sonoro</span>
        <span class="db-value" id="dbValue">—</span>
      </div>
      <div class="db-track"><div class="db-fill" id="dbFill"></div></div>
    </div>

    <br>
    <button class="btn" id="mainBtn" onclick="toggleMic()">▶ Activar micrófono</button>
    <div class="error-msg" id="errorMsg" style="display:none"></div>
  </div>

  <!-- Scale reference -->
  <div class="card scale-card">
    <div class="section-title">Guía de niveles</div>
    <div id="scaleList"></div>
  </div>

  <!-- Events log -->
  <div class="card events-card" id="eventsCard" style="display:none">
    <div class="section-title">Historial de eventos</div>
    <div id="eventsList"></div>
  </div>

  <div class="spacer"></div>
</div>

<script>
const CATEGORIES = [
  { id:"silence", label:"Silencio",       emoji:"🤫", color:"#6B7280", minDb:0,   maxDb:25  },
  { id:"whisper", label:"Murmullo",       emoji:"💬", color:"#8B5CF6", minDb:25,  maxDb:45  },
  { id:"talk",    label:"Conversación",   emoji:"🗣️", color:"#3B82F6", minDb:45,  maxDb:60  },
  { id:"music",   label:"Música / TV",    emoji:"🎵", color:"#10B981", minDb:60,  maxDb:70  },
  { id:"loud",    label:"Ruido fuerte",   emoji:"📣", color:"#F59E0B", minDb:70,  maxDb:80  },
  { id:"alarm",   label:"¡Alarma!",       emoji:"🚨", color:"#EF4444", minDb:80,  maxDb:Infinity },
];

const BAR_COUNT = 40;
let active = false;
let audioCtx, analyser, source, raf;
let lastCatId = "silence";
let lastEventTime = 0;
let events = [];

// Build wave bars
const waveWrap = document.getElementById("waveWrap");
const bars = [];
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement("div");
  b.className = "bar";
  b.style.height = "4px";
  waveWrap.appendChild(b);
  bars.push(b);
}

// Build scale list
const scaleList = document.getElementById("scaleList");
CATEGORIES.forEach(c => {
  const dbText = c.id === "silence" ? "< 25 dB" : c.id === "alarm" ? "> 80 dB" : `${c.minDb}–${c.maxDb} dB`;
  const row = document.createElement("div");
  row.className = "scale-row";
  row.id = "scale-" + c.id;
  row.innerHTML = `
    <span class="scale-emoji">${c.emoji}</span>
    <span class="scale-name" id="scaleName-${c.id}">${c.label}</span>
    <span class="scale-db">${dbText}</span>
  `;
  scaleList.appendChild(row);
});

function getCategory(db) {
  return CATEGORIES.find(c => db >= c.minDb && db < c.maxDb) || CATEGORIES[0];
}

function updateUI(db, cat) {
  // Status card
  document.getElementById("bigEmoji").textContent = cat.emoji;
  const lbl = document.getElementById("statusLabel");
  lbl.textContent = cat.label;
  lbl.style.color = cat.color;
  document.getElementById("statusSub").textContent = "Escuchando tu entorno...";
  document.getElementById("statusCard").style.borderColor = cat.color + "55";

  // dB meter
  document.getElementById("dbMeter").style.display = "block";
  document.getElementById("dbValue").textContent = db > 0 ? `${Math.round(db)} dB` : "—";
  document.getElementById("dbValue").style.color = cat.color;
  const pct = Math.min(100, Math.max(0, (db / 100) * 100));
  const fill = document.getElementById("dbFill");
  fill.style.width = pct + "%";
  fill.style.background = `linear-gradient(90deg, #7C3AED, ${cat.color})`;

  // Scale highlight
  CATEGORIES.forEach(c => {
    const row = document.getElementById("scale-" + c.id);
    const name = document.getElementById("scaleName-" + c.id);
    if (c.id === cat.id) {
      row.style.background = c.color + "15";
      row.style.borderColor = c.color + "40";
      name.style.color = c.color;
    } else {
      row.style.background = "transparent";
      row.style.borderColor = "transparent";
      name.style.color = "#D1D5DB";
    }
  });
}

function resetUI() {
  document.getElementById("bigEmoji").textContent = "🎙️";
  const lbl = document.getElementById("statusLabel");
  lbl.textContent = "Micrófono apagado";
  lbl.style.color = "#4B5563";
  document.getElementById("statusSub").textContent = "Tocá el botón para comenzar";
  document.getElementById("statusCard").style.borderColor = "#1F2937";
  document.getElementById("dbMeter").style.display = "none";
  bars.forEach(b => { b.style.height = "4px"; b.style.background = "#374151"; });
  CATEGORIES.forEach(c => {
    document.getElementById("scale-" + c.id).style.background = "transparent";
    document.getElementById("scale-" + c.id).style.borderColor = "transparent";
    document.getElementById("scaleName-" + c.id).style.color = "#D1D5DB";
  });
}

function addEvent(cat, db) {
  const ev = { ...cat, time: Date.now(), db };
  events.unshift(ev);
  if (events.length > 12) events.pop();
  renderEvents();
}

function renderEvents() {
  const list = document.getElementById("eventsList");
  const card = document.getElementById("eventsCard");
  if (events.length === 0) { card.style.display = "none"; return; }
  card.style.display = "block";
  list.innerHTML = "";
  const now = Date.now();
  events.forEach(ev => {
    const age = now - ev.time;
    const opacity = Math.max(0.15, 1 - age / 8000);
    const row = document.createElement("div");
    row.className = "event-row";
    row.style.borderColor = ev.color + "33";
    row.style.opacity = opacity;
    const t = new Date(ev.time).toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
    row.innerHTML = `
      <span class="event-emoji">${ev.emoji}</span>
      <div class="event-info">
        <div class="event-name" style="color:${ev.color}">${ev.label}</div>
        <div class="event-time">${t}</div>
      </div>
      <span class="event-badge" style="background:${ev.color}22;color:${ev.color}">${Math.round(ev.db)} dB</span>
    `;
    list.appendChild(row);
  });
}

// Refresh event opacity every 2s
setInterval(renderEvents, 2000);

async function startMic() {
  document.getElementById("errorMsg").style.display = "none";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    active = true;

    const btn = document.getElementById("mainBtn");
    btn.textContent = "⏹ Detener";
    btn.classList.add("stop");

    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function loop() {
      analyser.getByteFrequencyData(dataArray);

      const rms = Math.sqrt(dataArray.reduce((s, v) => s + v * v, 0) / dataArray.length);
      const db = rms > 0 ? 20 * Math.log10(rms / 128) + 60 : 0;
      const dbClamped = Math.max(0, db);
      const cat = getCategory(dbClamped);

      // Update bars
      for (let i = 0; i < BAR_COUNT; i++) {
        const v = (dataArray[i] || 0) / 255 * 100;
        bars[i].style.height = Math.max(4, v) + "px";
        bars[i].style.background = cat.color;
      }

      updateUI(dbClamped, cat);

      // Log event
      const now = Date.now();
      if (cat.id !== lastCatId && now - lastEventTime > 1500) {
        lastCatId = cat.id;
        lastEventTime = now;
        if (cat.id !== "silence") addEvent(cat, dbClamped);
      }

      raf = requestAnimationFrame(loop);
    }
    loop();
  } catch(e) {
    const err = document.getElementById("errorMsg");
    err.textContent = "No se pudo acceder al micrófono. Verificá los permisos del navegador.";
    err.style.display = "block";
  }
}

function stopMic() {
  cancelAnimationFrame(raf);
  if (source) source.disconnect();
  if (audioCtx) audioCtx.close();
  source = null; audioCtx = null; analyser = null;
  active = false;
  const btn = document.getElementById("mainBtn");
  btn.textContent = "▶ Activar micrófono";
  btn.classList.remove("stop");
  resetUI();
}

function toggleMic() {
  active ? stopMic() : startMic();
}
</script>
</body>
</html>
